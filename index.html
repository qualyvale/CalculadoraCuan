<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Calculadora Cuan – Frontend</title>
    <style>
      body{font-family:sans-serif;max-width:600px;margin:80px auto;text-align:center}
      textarea{width:100%;height:120px}
      button{margin-top:8px;padding:8px 16px}
      pre{background:#f7f7f7;padding:12px;border-radius:4px;text-align:left}
    </style>
  </head>
  <body>
    <h1>Plataforma de Redação – Teste Rápido</h1>

    <textarea id="texto" placeholder="Cole sua redação aqui…"></textarea>
    <br />
    <button onclick="avaliar()">Avaliar Redação</button>

    <h2>Resultado</h2>
    <pre id="resultado">– nada ainda –</pre>

    <script>
      async function avaliar() {
        const texto = document.getElementById('texto').value;
        const r = await fetch('/api/redacao/avaliar', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ texto })
        });
        const data = await r.json();
        document.getElementById('resultado').textContent =
          JSON.stringify(data, null, 2);
      }
    </script>
  </body>
</html>
